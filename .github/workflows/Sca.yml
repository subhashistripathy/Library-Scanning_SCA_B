name: Snyk Security Scan

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  snyk-security:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node (required for Snyk CLI)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install Snyk CLI
      - name: Install Snyk CLI
        run: npm install -g snyk

      # 4. Authenticate Snyk
      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      # -------------------------------
      # ✅ SAST (Code Scan)
      # -------------------------------
      - name: Run Snyk Code (SARIF)
        env:
          SNYK_TOKEN: aed514c5-df9e-40d2-8cfc-51990b7a3cde
        run: |
          snyk code test \
            --all-projects \
            --sarif-file-output=snyk-code.sarif || true

      - name: Upload SAST SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-code.sarif

      # -------------------------------
      # SCA (Library Scan)
      # -------------------------------
      - name: Run Snyk Open Source (SARIF)
        env:
          SNYK_TOKEN: aed514c5-df9e-40d2-8cfc-51990b7a3cde
        run: |
          snyk test \
            --severity-threshold=low \
            --sarif-file-output=snyk-oss.sarif || true

      - name: Upload SCA SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-oss.sarif

      # -------------------------------
      # BLOCKING STEP
      # -------------------------------
      - name: Enforce Security Gate (Fail Pipeline)
        env:
          SNYK_TOKEN: aed514c5-df9e-40d2-8cfc-51990b7a3cde
        run: |
          snyk code test --severity-threshold=high
          snyk test --severity-threshold=high
